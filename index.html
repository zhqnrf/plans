    <style>
        /* CSS TETAP SAMA SEPERTI ASLINYA */
        :root {
            --primary: #8e44ad; --secondary: #ff9f43; --accent: #ff6b6b; --bg: #1e272e;
            --text-light: #f5f6fa; --text-dark: #2d3436; --card-bg: rgba(255, 255, 255, 0.95); --gold: #f1c40f;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text-light); margin: 0; padding: 15px; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -2; }
        .bg-glow { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, rgba(142,68,173,0.4) 0%, rgba(30,39,46,0) 70%); border-radius: 50%; z-index: -1; filter: blur(40px); animation: pulse 6s infinite alternate; }
        .o1 { top: -100px; left: -50px; } .o2 { bottom: -50px; right: -50px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 0.8; } }
        header { text-align: center; margin-bottom: 25px; margin-top: 10px; z-index: 10; }
        header h1 { font-family: 'Playball', cursive; font-size: 2.8rem; margin: 0; background: linear-gradient(45deg, var(--gold), #ffcccc, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        header p { font-size: 0.85rem; margin: 5px 0; opacity: 0.9; letter-spacing: 1px; text-transform: uppercase; }
        .card { background: var(--card-bg); width: 100%; max-width: 450px; border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); color: var(--text-dark); position: relative; overflow: hidden; border: 2px solid transparent; background-clip: padding-box; transition: transform 0.3s; }
        .card:active { transform: translateY(2px) scale(0.99); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary)); }
        .card-icon-bg { position: absolute; font-size: 8rem; opacity: 0.05; color: var(--primary); right: -20px; bottom: -20px; z-index: 0; animation: rotateIcon 15s linear infinite; }
        @keyframes rotateIcon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; position: relative; z-index: 1; }
        .category-header iconify-icon { font-size: 1.8rem; color: var(--primary); }
        .category-title { font-weight: 800; font-size: 1.2rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .item-list { position: relative; z-index: 1; }
        .item { display: flex; align-items: flex-start; padding: 15px 0; border-bottom: 1px solid #eee; transition: background 0.2s; position: relative;}
        .item:last-child { border-bottom: none; }
        .checkbox-wrapper { position: relative; margin-right: 15px; margin-top: 2px; }
        input[type="checkbox"] { appearance: none; width: 26px; height: 26px; border: 2px solid var(--primary); border-radius: 8px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: white; }
        input[type="checkbox"]:checked { background-color: var(--primary); border-color: var(--primary); transform: scale(1.1) rotate(5deg); }
        input[type="checkbox"]:checked::after { content: '✔'; position: absolute; color: white; font-size: 16px; font-weight: 900; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        label { display: flex; flex-direction: column; cursor: pointer; width: calc(100% - 70px); }
        .item-text { font-size: 0.95rem; font-weight: 600; color: var(--text-dark); transition: 0.3s; }
        .item-details { font-size: 0.8rem; color: #7f8c8d; margin-top: 4px; line-height: 1.4; }
        input[type="checkbox"]:checked + label .item-text { text-decoration: line-through; opacity: 0.6; color: #7f8c8d; }
        input[type="checkbox"]:checked + label .item-details { opacity: 0.5; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-left: 5px; text-transform: uppercase; }
        .badge-priority { background-color: var(--accent); color: white; }
        .badge-money { background-color: #2ecc71; color: white; }
        
        /* Modal & Edit Btn */
        .btn-edit { background: none; border: none; color: var(--secondary); font-size: 1.4rem; cursor: pointer; margin-left: auto; padding: 5px; transition: 0.2s; display: flex; align-items: center; }
        .btn-edit:hover { color: var(--primary); transform: scale(1.1); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg); border: 2px solid var(--primary); width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; text-align: center; color: var(--text-light); transform: translateY(-20px); transition: transform 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-title { font-weight: bold; margin-top: 0; color: var(--gold); }
        .modal-textarea { width: 100%; height: 120px; margin: 15px 0; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); background: rgba(255,255,255,0.05); color: white; font-family: inherit; resize: none; font-size: 0.9rem; }
        .modal-textarea:focus { outline: none; border-color: var(--secondary); background: rgba(255,255,255,0.1); }
        .modal-actions { display: flex; gap: 10px; justify-content: center; }
        .btn-save { background: linear-gradient(45deg, var(--primary), var(--secondary)); border: none; padding: 10px 25px; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-close { background: transparent; border: 1px solid #7f8c8d; padding: 10px 25px; color: #7f8c8d; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; }
        footer { margin-top: auto; margin-bottom: 10px; font-size: 0.75rem; text-align: center; opacity: 0.6; z-index: 10; }

</head>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const TURSO_URL = "https://jobtracker-zhqnrf.aws-us-east-2.turso.io/v2/pipeline"; 
        const TURSO_TOKEN = "eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3NzQ2ODcwMDAsImlkIjoiZTMzNjI2YTctNDAyMi00ZDQ4LWJmNzYtZDYzMDk4MDdjNWQ4IiwicmlkIjoiNDM5Yzg4NDUtMGEwMS00MzAxLTkzMjktZDZjNTljN2Q4ZTliIn0.Q92uGh3VbPE6OhU5SVgBlZ_fqhYA8DoULsWhZ_UOtKIaHEyZaqbddcYvdDaHA6KnnytFRUHjeKwxijl4wGIBBQ";

        async function queryTurso(sqlQuery, argsArray = []) {
            const formattedArgs = argsArray.map(arg => ({ type: "text", value: String(arg) }));
            const payload = {
                requests: [
                    { type: "execute", stmt: { sql: sqlQuery, args: formattedArgs } },
                    { type: "close" }
                ]
            };
            const response = await fetch(TURSO_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${TURSO_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error("HTTP Error " + response.status);
            return await response.json();
        }

        queryTurso("CREATE TABLE IF NOT EXISTS planner_notes (id TEXT PRIMARY KEY, content TEXT)")
            .then(() => console.log("Database Siap!"))
            .catch(err => console.error("Database Error:", err));

        particlesJS("particles-js", {
          particles: { number: { value: 60, density: { enable: true, value_area: 800 } }, color: { value: ["#8e44ad", "#ff9f43", "#ffffff"] }, shape: { type: "circle" }, opacity: { value: 0.3, random: true }, size: { value: 3, random: true }, line_linked: { enable: true, distance: 150, color: "#8e44ad", opacity: 0.1, width: 1 }, move: { enable: true, speed: 1.5, direction: "none", random: true, straight: false, out_mode: "out" } },
          interactivity: { events: { onhover: { enable: false }, onclick: { enable: false } } }, retina_detect: true
        });

        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(box => {
            if (localStorage.getItem(box.id) === 'true') box.checked = true;
            box.addEventListener('change', () => {
                localStorage.setItem(box.id, box.checked);
                if (box.checked && window.navigator.vibrate) window.navigator.vibrate(80);
            });
        });

        let currentNoteId = null;

        async function openModal(id, title) {
            currentNoteId = id;
            document.getElementById('modalTitle').innerText = title;
            const inputField = document.getElementById('modalInput');
            inputField.value = 'Memuat data...';
            document.getElementById('answerModal').classList.add('active');

            try {
                const data = await queryTurso("SELECT content FROM planner_notes WHERE id = ?", [id]);
                if (data.results && data.results[0].response.result.rows.length > 0) {
                    inputField.value = data.results[0].response.result.rows[0][0].value;
                } else {
                    inputField.value = '';
                }
            } catch (err) {
                console.error(err);
                inputField.value = localStorage.getItem('note_'+id) || ''; 
            }
        }

        function closeModal() {
            document.getElementById('answerModal').classList.remove('active');
        }

        async function saveAnswer() {
            const text = document.getElementById('modalInput').value;
            const btnSave = document.querySelector('.btn-save');
            btnSave.innerText = 'Menyimpan...';

            try {
                await queryTurso(
                    "INSERT INTO planner_notes (id, content) VALUES (?, ?) ON CONFLICT(id) DO UPDATE SET content = excluded.content", 
                    [currentNoteId, text]
                );
                localStorage.setItem('note_'+currentNoteId, text); 
                btnSave.innerText = 'Tersimpan!';
                setTimeout(() => {
                    closeModal();
                    btnSave.innerText = 'Simpan';
                }, 800);
            } catch (err) {
                console.error(err);
                alert('Gagal nyimpan ke database, tapi aman di memori HP/Laptop.');
                localStorage.setItem('note_'+currentNoteId, text);
                closeModal();
                btnSave.innerText = 'Simpan';
            }
        }
    </script>
